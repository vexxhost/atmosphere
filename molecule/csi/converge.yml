# NOTE(mnaser): This play is required for csi_driver to be evaluated properly
#               so the when condition on import_playbook works correctly
- name: Debug CSI driver value
  hosts: all
  tasks:
    - name: Display CSI driver value and environment variable
      ansible.builtin.debug:
        msg: "csi_driver={{ csi_driver }}, MOLECULE_CSI_DRIVER={{ lookup('env', 'MOLECULE_CSI_DRIVER') }}"

- hosts: localhost
  gather_facts: false
  tasks:
    - name: Build atmosphere binary
      ansible.builtin.command:
        cmd: go build -o ./bin/atmosphere ./cmd/atmosphere
        chdir: "{{ playbook_dir }}/../../"
      delegate_to: localhost
      changed_when: true

    - name: Deploy with parallel orchestrator (with ceph)
      ansible.builtin.command:
        cmd: >-
          {{ playbook_dir }}/../../bin/atmosphere deploy
          --inventory {{ inventory_file }}
          --playbook-dir {{ playbook_dir }}/../../playbooks
          --tags ceph,kubernetes,csi
      delegate_to: localhost
      changed_when: true
      when: hostvars[groups['all'][0]]['csi_driver'] == 'rbd'

    - name: Deploy with parallel orchestrator (without ceph)
      ansible.builtin.command:
        cmd: >-
          {{ playbook_dir }}/../../bin/atmosphere deploy
          --inventory {{ inventory_file }}
          --playbook-dir {{ playbook_dir }}/../../playbooks
          --tags kubernetes,csi
      delegate_to: localhost
      changed_when: true
      when: hostvars[groups['all'][0]]['csi_driver'] != 'rbd'
