atmosphere_image_prefix: "{{ lookup('env', 'ATMOSPHERE_IMAGE_PREFIX') | default('', True) }}"
atmosphere_network_backend: "{{ lookup('env', 'ATMOSPHERE_NETWORK_BACKEND') | default('openvswitch', True) }}"
cluster_issuer_type: self-signed
ceph_conf_overrides:
  - section: global
    option: mon allow pool size one
    value: true
  - section: global
    option: osd crush chooseleaf type
    value: 0
  - section: mon
    option: auth allow insecure global id reclaim
    value: false
ceph_osd_devices:
  - "/dev/ceph-{{ inventory_hostname_short }}-osd0/data"
  - "/dev/ceph-{{ inventory_hostname_short }}-osd1/data"
  - "/dev/ceph-{{ inventory_hostname_short }}-osd2/data"
cilium_helm_values:
  operator:
    replicas: 1
ceph_csi_rbd_helm_values:
  provisioner:
    replicaCount: 1

ceph_version: 18.2.7
kubernetes_keepalived_interface: bond0.4094
keepalived_interface: bond0.103
keepalived_vip: 10.103.0.250
csi_driver: local-path-provisioner
valkey_helm_values:
  replica:
    replicaCount: 1
ingress_nginx_helm_values:
  controller:
    config:
      worker-processes: 2
percona_xtradb_cluster_spec:
  allowUnsafeConfigurations: true
  pxc:
    size: 1
  haproxy:
    size: 1
keystone_helm_values:
  pod:
    replicas:
      api: 1
barbican_helm_values:
  pod:
    replicas:
      api: 1
rook_ceph_cluster_radosgw_spec:
  metadataPool:
    failureDomain: osd
  dataPool:
    failureDomain: osd
  gateway:
    instances: 1
glance_helm_values:
  conf:
    glance:
      DEFAULT:
        workers: 2
      glance_store:
        rbd_store_replication: 1
  pod:
    replicas:
      api: 1
glance_images:
  - name: cirros
    url: http://download.cirros-cloud.net/0.6.2/cirros-0.6.2-x86_64-disk.img
    min_disk: 1
    disk_format: raw
    container_format: bare
    is_public: true
staffeln_helm_values:
  pod:
    replicas:
      api: 1
      conductor: 1
cinder_helm_values:
  conf:
    ceph:
      pools:
        backup:
          replication: 1
        cinder.volumes:
          replication: 1
    cinder:
      DEFAULT:
        osapi_volume_workers: 2
  pod:
    replicas:
      api: 1
      scheduler: 1
placement_helm_values:
  conf:
    placement_api_uwsgi:
      uwsgi:
        processes: 2
  pod:
    replicas:
      api: 1
ovn_helm_values:
  conf:
    auto_bridge_add:
      br-ex: bond0
  pod:
    replicas:
      ovn_ovsdb_nb: 1
      ovn_ovsdb_sb: 1
      ovn_northd: 1
coredns_helm_values:
  replicaCount: 1
nova_helm_values:
  conf:
    nova:
      DEFAULT:
        osapi_compute_workers: 2
        metadata_workers: 2
      conductor:
        workers: 2
      scheduler:
        workers: 2
  pod:
    replicas:
      api_metadata: 1
      osapi: 1
      conductor: 1
      scheduler: 1
      novncproxy: 1
      spiceproxy: 1
  manifests:
    statefulset_compute_ironic: "{{ lookup('env', 'ATMOSPHERE_BAREMETAL_EMULATOR_ENABLED') | default('false', True) }}"

neutron_helm_values:
  conf:
    neutron:
      DEFAULT:
        api_workers: 2
        rpc_workers: 2
        metadata_workers: 2
  pod:
    replicas:
      server: 1
      rpc_server: 1
heat_helm_values:
  conf:
    heat:
      DEFAULT:
        num_engine_workers: 2
      heat_api:
        workers: 2
      heat_api_cfn:
        workers: 2
      heat_api_cloudwatch:
        workers: 2
  pod:
    replicas:
      api: 1
      cfn: 1
      cloudwatch: 1
      engine: 1
octavia_helm_values:
  conf:
    octavia:
      controller_worker:
        workers: 2
    octavia_api_uwsgi:
      uwsgi:
        processes: 2
  pod:
    replicas:
      api: 1
      worker: 1
      housekeeping: 1
magnum_helm_values:
  conf:
    magnum:
      api:
        workers: 2
      conductor:
        workers: 2
  pod:
    replicas:
      api: 1
      conductor: 1
magnum_image_disk_format: qcow2
magnum_images: "[ {{ _magnum_images[-1] }} ]"
manila_helm_values:
  conf:
    manila:
      DEFAULT:
        osapi_share_workers: 2
  pod:
    replicas:
      api: 1
      scheduler: 1
horizon_helm_values:
  pod:
    replicas:
      server: 1

ironic_helm_values:
  conf:
    ironic:
      DEFAULT:
        debug: "{{ lookup('env', 'ATMOSPHERE_DEBUG') | default('false', True) }}"
        debug_tracebacks_in_api: "{{ lookup('env', 'ATMOSPHERE_DEBUG') | default('false', True) }}"
        pecan_debug: "{{ lookup('env', 'ATMOSPHERE_DEBUG') | default('false', True) }}"
      api:
        api_workers: 1
      agent:
        deploy_logs_collect: always
        deploy_logs_storage_backend: local
        deploy_logs_local_path: /tmp/deploy_logs
      conductor:
        power_state_change_timeout: 120
        automated_clean: false
      service_catalog:
        # depends on which port your Nodeport pick
        endpoint_override: "http://172.24.6.254:32574"
      neutron:
        # For virtual host
        port_setup_delay: 15
  pod:
    replicas:
      api: 1
      conductor: 1
  network:
    pxe:
      device: bond0.4090

atmosphere_baremetal_emulator_enabled: "{{ lookup('env', 'ATMOSPHERE_BAREMETAL_EMULATOR_ENABLED') | default('true', True) }}"
atmosphere_baremetal_pxe_use_internal_bridge: false
bm_emulator_gpu_enabled: "{{ lookup('env', 'ATMOSPHERE_BAREMETAL_EMULATOR_GPU_ENABLED') | default('true', True) }}"

ironic_bare_metal_network_manage: true
ironic_bare_metal_network_name: baremetal
ironic_bare_metal_network_provider_physical_network: external
ironic_bare_metal_network_provider_network_type: vlan
ironic_bare_metal_network_provider_segmentation_id: 4090
ironic_bare_metal_subnet_name: baremetal
ironic_bare_metal_subnet_cidr: 172.24.6.0/24
ironic_bare_metal_subnet_allocation_pool_start: 172.24.6.10
ironic_bare_metal_subnet_allocation_pool_end: 172.24.6.200
ironic_python_agent_deploy_kernel_name: ir-deploy-redfish.kernel
ironic_python_agent_deploy_kernel_url: https://tarballs.openstack.org/ironic-python-agent/dib/files/ipa-centos9-master.kernel
ironic_python_agent_deploy_ramdisk_name: ir-deploy-redfish.initramfs
ironic_python_agent_deploy_ramdisk_url: https://tarballs.openstack.org/ironic-python-agent/dib/files/ipa-centos9-master.initramfs
