- hosts: localhost
  gather_facts: false
  tasks:
    - name: Build atmosphere binary
      ansible.builtin.command:
        cmd: go build -o ./bin/atmosphere ./cmd/atmosphere
        chdir: "{{ playbook_dir }}/../../"
      delegate_to: localhost
      changed_when: true
      environment:
        CGO_ENABLED: "0"
        PATH: "/usr/local/go/bin:{{ ansible_env.PATH | default(lookup('env', 'PATH')) }}"

    - name: Deploy with parallel orchestrator
      ansible.builtin.command:
        cmd: >-
          {{ playbook_dir }}/../../bin/atmosphere deploy
          --inventory {{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/inventory.yaml
          --playbook-dir {{ playbook_dir }}/../../playbooks
          --tags kubernetes,csi,cert-manager,cluster-issuer,ingress-nginx,rabbitmq-cluster-operator,percona-xtradb-cluster-operator,percona-xtradb-cluster,valkey,memcached,keycloak,kube-prometheus-stack,keystone,horizon
      delegate_to: localhost
      changed_when: true
