---
- hosts: localhost
  gather_facts: false
  tasks:
    - name: Build atmosphere binary
      ansible.builtin.command:
        cmd: go build -o ./bin/atmosphere ./cmd/atmosphere
        chdir: "{{ playbook_dir }}/../../"
      delegate_to: localhost
      changed_when: true
      environment:
        CGO_ENABLED: "0"
        PATH: "/usr/local/go/bin:{{ ansible_env.PATH | default(lookup('env', 'PATH')) }}"

    - name: Deploy with parallel orchestrator
      ansible.builtin.command:
        cmd: >-
          {{ playbook_dir }}/../../bin/atmosphere deploy
          --inventory {{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/inventory.yaml
      delegate_to: localhost
      changed_when: true

- name: Configure networking
  hosts: all
  become: true
  tasks:
    - name: Add IP address to "br-ex"
      changed_when: false
      ansible.builtin.shell:
        cmd: ip addr add 10.96.250.10/24 dev br-ex || true

    - name: Set "br-ex" interface to "up"
      changed_when: false
      ansible.builtin.shell:
        cmd: ip link set br-ex up || true
