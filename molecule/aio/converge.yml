---
- hosts: all
  gather_facts: false
  tasks:
    - name: Build atmosphere binary
      ansible.builtin.command:
        cmd: go build -o ./bin/atmosphere ./cmd/atmosphere
      args:
        chdir: "{{ zuul.project.src_dir | default(playbook_dir + '/../..') }}"
      run_once: true
      changed_when: false
      environment:
        CGO_ENABLED: "0"
        PATH: "/usr/local/go/bin:{{ ansible_env.PATH | default(lookup('env', 'PATH')) }}"

    - name: Build atmosphere-wait binary
      ansible.builtin.command:
        cmd: go build -o ./bin/atmosphere-wait ./cmd/atmosphere-wait
      args:
        chdir: "{{ zuul.project.src_dir | default(playbook_dir + '/../..') }}"
      run_once: true
      changed_when: false
      environment:
        CGO_ENABLED: "0"
        PATH: "/usr/local/go/bin:{{ ansible_env.PATH | default(lookup('env', 'PATH')) }}"

    - name: Install atmosphere-wait to PATH
      become: true
      ansible.builtin.copy:
        src: "{{ zuul.project.src_dir | default(playbook_dir + '/../..') }}/bin/atmosphere-wait"
        dest: /usr/local/bin/atmosphere-wait
        mode: "0755"
        remote_src: true
      run_once: true

    - name: Deploy with parallel orchestrator
      ansible.builtin.shell:
        cmd: >
          . .venv/bin/activate &&
          ./bin/atmosphere deploy
          --inventory ./inventory.yaml
          {{ '--tags ' + atmosphere_deploy_tags if atmosphere_deploy_tags is defined else '' }}
        executable: /bin/bash
      args:
        chdir: "{{ zuul.project.src_dir | default(playbook_dir + '/../..') }}"
      run_once: true
      changed_when: false

- name: Configure networking
  hosts: all
  become: true
  tasks:
    - name: Add IP address to "br-ex"
      changed_when: false
      ansible.builtin.shell:
        cmd: ip addr add 10.96.250.10/24 dev br-ex || true

    - name: Set "br-ex" interface to "up"
      changed_when: false
      ansible.builtin.shell:
        cmd: ip link set br-ex up || true
