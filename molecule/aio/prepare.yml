- name: Prepare
  hosts: all
  become: true
  tasks:
    - name: Workaround system hostname
      block:
        - name: Configure short hostname
          ansible.builtin.hostname:
            name: "{{ inventory_hostname_short }}"
        - name: Ensure hostname inside hosts file
          ansible.builtin.lineinfile:
            path: /etc/hosts
            regexp: '^127\.0\.1\.1'
            line: 127.0.1.1 {{ inventory_hostname }} {{ inventory_hostname_short }}

    - name: Install "dirmngr" for GPG keyserver operations
      ansible.builtin.apt:
        name: dirmngr
        state: present

    - name: Purge "snapd" package
      when: ansible_facts['distribution'] | lower == 'ubuntu'
      ansible.builtin.apt:
        name: snapd
        state: absent
        purge: true

    - name: Install Go toolchain for local builds
      when: zuul is not defined
      block:
        - name: Download Go toolchain
          ansible.builtin.get_url:
            url: https://go.dev/dl/go1.24.4.linux-amd64.tar.gz
            dest: /tmp/go.tar.gz
            mode: "0644"
        - name: Remove any existing Go installation
          ansible.builtin.file:
            path: /usr/local/go
            state: absent
        - name: Extract Go toolchain
          ansible.builtin.unarchive:
            src: /tmp/go.tar.gz
            dest: /usr/local
            remote_src: true

- name: Generate workspace
  ansible.builtin.import_playbook: vexxhost.atmosphere.generate_workspace
  vars:
    workspace_path: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}"
    domain_name: "{{ ansible_facts['default_ipv4']['address'].replace('.', '-') }}.nip.io"

- name: Copy AIO overrides to workspace
  hosts: all
  become: true
  tasks:
    - name: Copy molecule.yml overrides to project group_vars
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/group_vars/all/molecule.yml"
        dest: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/group_vars/all/molecule.yml"
        mode: "0644"
      run_once: true

- name: Overwrite OSD devices with LVM-backed paths
  hosts: all
  become: true
  tasks:
    - name: Overwrite existing osds.yml file
      ansible.builtin.copy:
        dest: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/group_vars/cephs/osds.yml"
        mode: '0644'
        content: |
          ceph_osd_devices:
            - "/dev/ceph-{{ inventory_hostname_short }}-osd0/data"
            - "/dev/ceph-{{ inventory_hostname_short }}-osd1/data"
            - "/dev/ceph-{{ inventory_hostname_short }}-osd2/data"

- name: Setup networking
  hosts: all
  become: true
  vars:
    management_bridge: "br-mgmt"
  tasks:
    - name: Create bridge for management network
      ignore_errors: true # noqa: ignore-errors
      changed_when: false
      ansible.builtin.command:
        cmd: "ip link add name {{ management_bridge }} type bridge"

    - name: Create fake interface for management bridge
      ignore_errors: true # noqa: ignore-errors
      changed_when: false
      ansible.builtin.command:
        cmd: "ip link add dummy0 type dummy"

    - name: Assign dummy interface to management bridge
      ignore_errors: true # noqa: ignore-errors
      changed_when: false
      ansible.builtin.command:
        cmd: "ip link set dummy0 master {{ management_bridge }}"

    - name: Assign IP address for management bridge
      ignore_errors: true # noqa: ignore-errors
      changed_when: false
      ansible.builtin.command:
        cmd: "ip addr add 10.96.240.200/24 dev {{ management_bridge }}"

    - name: Bring up interfaces
      ignore_errors: true # noqa: ignore-errors
      changed_when: false
      ansible.builtin.command:
        cmd: "ip link set {{ item }} up"
      loop:
        - br-mgmt
        - dummy0

- name: Create fake devices for Ceph
  ansible.builtin.import_playbook: vexxhost.ceph.create_fake_devices

- name: Prepare system for Neutron
  ansible.builtin.import_playbook: ../shared/prepare/neutron.yml
