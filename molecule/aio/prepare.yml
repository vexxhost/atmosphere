- name: Prepare systems for CI
  hosts: all
  tasks:
    - name: Configure short hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname_short }}"

    - name: Ensure hostname inside hosts file
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        line: 127.0.1.1 {{ inventory_hostname }} {{ inventory_hostname_short }}

    - name: Pull built images in CI
      when: lookup('env', 'DEPOT_BUILD_ID') is defined and lookup('env', 'DEPOT_BUILD_ID') != ''
      block:
        - name: Install "containerd"
          ansible.builtin.include_role:
            name: vexxhost.containers.containerd

        - name: Pull Atmosphere images
          register: depot_pull
          ansible.builtin.command:
            cmd: depot pull {{ lookup('env', 'DEPOT_BUILD_ID') }}

        - name: Print list of pulled images
          ansible.builtin.debug:
            msg: "{{ depot_pull.stdout_lines }}"

        - name: Gather list of images
          register: image_list
          ansible.builtin.command:
            cmd: ctr image ls

        - name: Print list of Atmosphere images
          ansible.builtin.debug:
            msg: "{{ image_list.stdout_lines }}"

- name: Create fake devices for Ceph
  ansible.builtin.import_playbook: vexxhost.ceph.create_fake_devices

- name: Prepare system for Neutron
  ansible.builtin.import_playbook: ../shared/prepare/neutron.yml

# TODO(mnaser): Drop this once we switch to vexxhost.ceph 3.0.0
- name: Configure Ceph workarounds
  hosts: cephs
  roles:
    - vexxhost.ceph.repository
  post_tasks:
    - name: Install "ceph-volume"
      ansible.builtin.package:
        name: ceph-volume
        state: present
  vars:
    ceph_version: 18.2.7
