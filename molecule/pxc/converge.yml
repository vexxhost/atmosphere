- hosts: localhost
  gather_facts: false
  tasks:
    - name: Build atmosphere binary
      ansible.builtin.command:
        cmd: go build -o ./bin/atmosphere ./cmd/atmosphere
        chdir: "{{ playbook_dir }}/../../"
      delegate_to: localhost
      changed_when: false
      environment:
        CGO_ENABLED: "0"
        PATH: "/usr/local/go/bin:{{ ansible_env.PATH | default(lookup('env', 'PATH')) }}"

    - name: Deploy with parallel orchestrator
      ansible.builtin.command:
        cmd: >-
          {{ playbook_dir }}/../../bin/atmosphere deploy
          --inventory {{ lookup('env', 'MOLECULE_INVENTORY_FILE') }}
          --tags percona-xtradb-cluster
      delegate_to: localhost
      changed_when: false
