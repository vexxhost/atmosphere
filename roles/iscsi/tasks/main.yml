- name: Install iscsi package
  ansible.builtin.package:
    name: "{{ 'iscsi-initiator-utils' if ansible_os_family == 'RedHat' else 'open-iscsi' }}"
    state: present

- name: Ensure iscsid is started
  ansible.builtin.service:
    name: iscsid
    state: started

- name: Configure LVM to blacklist all devices
  become: true
  ansible.builtin.lineinfile:
    path: /etc/lvm/lvm.conf
    regexp: '^\s*global_filter\s*='
    line: '    global_filter = [ "r|.*|" ]'
    insertafter: '^\s*devices\s*{'
    backup: true
