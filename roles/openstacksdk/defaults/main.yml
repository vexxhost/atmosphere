# openstacksdk_version:

# Number of retries when installing `openstacksdk` with pip.
#
# openstacksdk_pip_install_retries: 3
openstacksdk_pip_install_retries: 3

# Delay in seconds between pip install retries for `openstacksdk`.
#
# openstacksdk_pip_install_retry_delay: 5
openstacksdk_pip_install_retry_delay: 5
