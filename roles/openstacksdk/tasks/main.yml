- name: Install pip
  when: ansible_facts['os_family'] == 'Debian'
  ansible.builtin.package:
    name: python3-pip
    state: present

- name: Install openstacksdk with pip
  ansible.builtin.pip:
    name: >-
      {{ 'openstacksdk==' + openstacksdk_version
         if openstacksdk_version is defined
         else 'openstacksdk>1' }}
    break_system_packages: >-
      {{ ansible_facts['distribution'] == 'Ubuntu' and
         ansible_facts['distribution_version'] is version('24.04', '>=') }}
  register: _openstacksdk_pip_install
  retries: 3
  delay: 5
  until: _openstacksdk_pip_install is not failed

- name: Create openstack config directory
  become: true
  ansible.builtin.file:
    path: /etc/openstack
    state: directory
    owner: root
    group: root
    mode: "0600"

- name: Generate cloud config file
  become: true
  ansible.builtin.template:
    src: clouds.yaml.j2
    dest: /etc/openstack/clouds.yaml
    owner: root
    group: root
    mode: "0600"
