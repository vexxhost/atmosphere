- name: Generate resources
  ansible.builtin.import_tasks:
    file: generate_resources.yml

- name: Generate public key for SSH private key
  ansible.builtin.import_tasks:
    file: generate_public_key.yml

- name: Deploy Helm chart
  run_once: true
  kubernetes.core.helm:
    name: "{{ manila_helm_release_name }}"
    chart_ref: "{{ manila_helm_chart_ref }}"
    release_namespace: "{{ manila_helm_release_namespace }}"
    create_namespace: true
    kubeconfig: "{{ manila_helm_kubeconfig }}"
    values: "{{ _manila_helm_values | combine(manila_helm_values, recursive=True) }}"

- name: Create Ingress
  ansible.builtin.include_role:
    name: openstack_helm_ingress
  vars:
    openstack_helm_ingress_endpoint: sharev2
    openstack_helm_ingress_service_name: manila-api
    openstack_helm_ingress_service_port: 8786
    openstack_helm_ingress_annotations: "{{ manila_ingress_annotations }}"
    openstack_helm_ingress_class_name: "{{ manila_ingress_class_name }}"

- name: Update service tenant compute quotas
  ansible.builtin.command:
    cmd: >-
      openstack quota set
      --instances -1
      --cores -1
      --ram -1
      service
  environment:
    OS_CLOUD: atmosphere
  register: _manila_compute_quota_set
  changed_when: _manila_compute_quota_set.rc == 0

- name: Update service tenant volume quotas
  ansible.builtin.command:
    cmd: >-
      openstack quota set
      --volumes -1
      --gigabytes -1
      service
  environment:
    OS_CLOUD: atmosphere
  register: _manila_volume_quota_set
  changed_when: _manila_volume_quota_set.rc == 0

- name: Update service tenant network quotas
  ansible.builtin.command:
    cmd: >-
      openstack quota set
      --secgroups -1
      --secgroup-rules -1
      service
  environment:
    OS_CLOUD: atmosphere
  register: _manila_network_quota_set
  changed_when: _manila_network_quota_set.rc == 0
