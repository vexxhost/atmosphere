# Thin shim that runs the keystone tasks safe to execute in parallel
# with the rest of the keystone role. The actual task list lives in
# the keystone role at `tasks/_pre.yml` to avoid duplication.
- name: Run parallelizable keystone tasks
  ansible.builtin.include_role:
    name: vexxhost.atmosphere.keystone
    tasks_from: _pre.yml
