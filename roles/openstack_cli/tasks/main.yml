- name: Uninstall OpenStack client system packages
  ansible.builtin.package:
    name: "{{ openstack_cli_packages }}"
    state: absent
  register: _uninstall_osc
  retries: 5
  delay: 10
  until: _uninstall_osc is not failed
  when: ansible_facts['os_family'] in ['Debian']

- name: Uninstall Ubuntu Cloud Archive keyring
  ansible.builtin.apt:
    name: ubuntu-cloud-keyring
    state: absent
  register: _uninstall_uca_keyring
  retries: 5
  delay: 10
  until: _uninstall_uca_keyring is not failed
  when: ansible_facts['os_family'] in ['Debian']

- name: Remove Ubuntu Cloud Archive repository
  ansible.builtin.apt_repository:
    filename: ubuntu-cloud-archive
    repo: "{{ openstack_cli_cloud_archive_repo }}"
    state: absent
  register: _remove_uca_repo
  retries: 5
  delay: 10
  until: _remove_uca_repo is not failed
  when: ansible_facts['os_family'] in ['Debian']

- name: Generate OpenStack-Helm endpoints
  ansible.builtin.include_role:
    name: openstack_helm_endpoints
  vars:
    openstack_helm_endpoints_list: ["identity"]

- name: Generate openrc file
  become: true
  ansible.builtin.template:
    src: openrc.j2
    dest: /root/openrc
    owner: root
    group: root
    mode: "0600"

- name: Install osc wrapper script
  become: true
  ansible.builtin.template:
    src: osc.sh.j2
    dest: /usr/local/bin/osc
    owner: root
    group: root
    mode: "0755"

- name: Install openstack wrapper script
  become: true
  ansible.builtin.template:
    src: openstack.sh.j2
    dest: /usr/local/bin/openstack
    owner: root
    group: root
    mode: "0755"

- name: Generate openstack aliases
  become: true
  ansible.builtin.template:
    src: atmosphere.sh.j2
    dest: /etc/profile.d/atmosphere.sh
    owner: root
    group: root
    mode: "0644"
