atmosphere_version: 6.0.0-beta.3 # x-release-please-version

# Ingress
atmosphere_ingress_class_name: atmosphere
atmosphere_ingress_cluster_issuer: atmosphere
atmosphere_ingress_annotations: {}
atmosphere_image_prefix: ""

# Kubernetes
atmosphere_kubernetes_version: "1.28.13"

# Network backend
atmosphere_network_backend: openvswitch

# This is for override values in atmosphere_images
atmosphere_image_overrides: {}

# Storage configuration overrides
#
# Override any values in the default storage configuration (_atmosphere_storage)
# which is defined in vars/main.yml.  The overrides are merged on top of the
# defaults using recursive dict merge.
atmosphere_storage: {}

defaults_ca_certificates_path: >-
  {{ '/etc/ssl/certs/ca-certificates.crt' if ansible_facts['os_family'] in ['Debian'] else '/etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem' }}

# Maximum number of concurrent `crictl pull` calls per host during the
# container image pre-pull step run by the deploy orchestrator.
#
# atmosphere_prepull_concurrency: 8
atmosphere_prepull_concurrency: 8

# Keys from `atmosphere_images` that compute-only hosts (members of the
# `computes` group that are not also in `controllers`) should pre-pull.
# Control-plane images are skipped on these hosts to save bandwidth and
# disk.
#
# atmosphere_prepull_compute_keys:
#   - libvirt
#   - nova_compute
atmosphere_prepull_compute_keys:
  - ceph
  - ceph_config_helper
  - cilium_node
  - libvirt
  - netoffload
  - neutron_openvswitch_agent
  - neutron_sriov_agent
  - node_exporter
  - nova_compute
  - nova_compute_ssh
  - ovn_controller
  - ovn_controller_gw
  - ovn_ovsdb_nb
  - ovn_ovsdb_sb
  - ovn_northd
  - openvswitch_db_server
  - openvswitch_vswitchd
