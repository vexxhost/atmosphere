atmosphere_version: 6.0.0-beta.3 # x-release-please-version

# Ingress
atmosphere_ingress_class_name: atmosphere
atmosphere_ingress_cluster_issuer: atmosphere
atmosphere_ingress_annotations: {}
atmosphere_image_prefix: ""

# Kubernetes
atmosphere_kubernetes_version: "1.28.13"

# Network backend
atmosphere_network_backend: openvswitch

# This is for override values in atmosphere_images
atmosphere_image_overrides: {}

# Unified storage configuration
#
# Single source of truth for all storage backends across OpenStack services.
# The system auto-derives per-service Helm values from this variable.
atmosphere_storage:
  # Image storage (Glance) — supports multiple backends
  images:
    default: rbd1
    backends:
      rbd1:
        type: ceph_rbd
        pool: glance.images
        replication: 3
        crush_rule: replicated_rule
        chunk_size: 8
        ceph_user: glance

  # Block storage (Cinder) — supports multiple backends
  volumes:
    default: rbd1
    backends:
      rbd1:
        type: ceph_rbd
        pool: cinder.volumes
        replication: 3
        crush_rule: replicated_rule
        ceph_user: cinder
        secret_uuid: 457eb676-33da-42ec-9a8c-9293d545c337

  # Backup storage (Cinder backup)
  backups:
    type: ceph_rbd
    pool: cinder.backups
    replication: 3
    crush_rule: replicated_rule
    ceph_user: cinderbackup

  # Ephemeral disk storage (Nova/libvirt)
  ephemeral:
    type: ceph_rbd
    pool: vms
    replication: 3
    crush_rule: replicated_rule
    ceph_user: cinder
    secret_uuid: 457eb676-33da-42ec-9a8c-9293d545c337

defaults_ca_certificates_path: >-
  {{ '/etc/ssl/certs/ca-certificates.crt' if ansible_facts['os_family'] in ['Debian'] else '/etc/pki/ca-trust/extracted/pem/tls-ca-bundle.pem' }}
