- name: Build deduplicated image list
  ansible.builtin.set_fact:
    _prepull_image_list: "{{ atmosphere_images.values() | unique | sort }}"

- name: Pre-pull container images
  ansible.builtin.command:
    cmd: "crictl pull {{ item }}"
  loop: "{{ _prepull_image_list }}"
  loop_control:
    label: "{{ item | regex_replace('.*/', '') | truncate(60, True) }}"
  async: "{{ prepull_images_timeout }}"
  poll: 0
  register: _prepull_async_jobs
  changed_when: false

- name: Wait for image pulls to complete
  ansible.builtin.async_status:
    jid: "{{ item.ansible_job_id }}"
  loop: "{{ _prepull_async_jobs.results }}"
  loop_control:
    label: "{{ item.item | regex_replace('.*/', '') | truncate(60, True) }}"
  register: _prepull_results
  until: _prepull_results is finished
  retries: "{{ (prepull_images_timeout / 10) | int }}"
  delay: 10
  ignore_errors: true

- name: Identify failed image pulls
  ansible.builtin.set_fact:
    _prepull_failed_images: >-
      {{ _prepull_results.results
         | selectattr('rc', 'defined')
         | selectattr('rc', 'gt', 0)
         | map(attribute='item.item')
         | list
         + _prepull_results.results
         | rejectattr('finished', 'defined')
         | map(attribute='item.item')
         | list
         + _prepull_results.results
         | selectattr('finished', 'defined')
         | rejectattr('finished')
         | map(attribute='item.item')
         | list }}

- name: Retry failed image pulls synchronously
  ansible.builtin.command:
    cmd: "crictl pull {{ item }}"
  loop: "{{ _prepull_failed_images }}"
  loop_control:
    label: "{{ item | regex_replace('.*/', '') | truncate(60, True) }}"
  register: _prepull_retry
  retries: "{{ prepull_images_retries }}"
  delay: "{{ prepull_images_retry_delay }}"
  until: _prepull_retry is not failed
  changed_when: false
  failed_when: false
  when: _prepull_failed_images | length > 0

- name: Report pre-pull summary
  vars:
    _total: "{{ _prepull_image_list | length }}"
    _failed_count: "{{ _prepull_failed_images | length }}"
    _still_failed: >-
      {{ _prepull_retry.results | default([])
         | selectattr('failed', 'defined')
         | selectattr('failed')
         | list | length }}
  ansible.builtin.debug:
    msg: >-
      Pre-pulled {{ _total }} unique images
      ({{ _failed_count }} required retry, {{ _still_failed }} still failing).
