# Name of the OpenStack-Helm gateway route to create
openstack_helm_gateway_route_name: "{{ openstack_helm_gateway_endpoint | replace('_', '-') }}"

# Hostname to expose for the gateway route
openstack_helm_gateway_host: "{{ openstack_helm_endpoints[openstack_helm_gateway_endpoint]['host_fqdn_override']['public']['host'] }}"

# Gateway class name
openstack_helm_gateway_class_name: "{{ atmosphere_gateway_class_name }}"

# Gateway name (the Gateway listener resource to attach routes to)
openstack_helm_gateway_name: "{{ atmosphere_gateway_name }}"

# Gateway configuration (combined from service defaults and overrides)
openstack_helm_gateway_config: {}
