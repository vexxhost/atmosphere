galaxy_info:
  author: VEXXHOST, Inc.
  description: |
    Synthetic VLAN-trunked bond0 + br-ex sub-IF setup for AIO scenarios
    (mcapi-bm, ib-bm). Installs an idempotent host script that recreates
    bond0 + dummy0 slave, replaces kernel-type bond0.<vid> sub-IFs with
    OVS internal ports tagged on br-ex (Fix #9 — see ib-bm session log),
    assigns sub-IF IPs, enables ip_forward and MASQUERADE for OVN tenant
    + ironic provisioning subnets.
  license: Apache-2.0
  min_ansible_version: "2.14"
  platforms:
    - name: Ubuntu
      versions:
        - jammy
dependencies: []
