- name: Fetch source image metadata from URL
  run_once: true
  ansible.builtin.uri:
    url: "{{ glance_image_url }}"
    method: HEAD
    follow_redirects: all
    status_code: [200]
  register: _glance_image_source_head
  retries: 3
  delay: "{{ 15 | random + 3 }}"
  until: _glance_image_source_head is not failed
  environment:
    http_proxy: "{{ glance_image_http_proxy }}"
    https_proxy: "{{ glance_image_https_proxy }}"
    no_proxy: "{{ glance_image_no_proxy }}"

- name: Fail when source URL does not return an ETag
  run_once: true
  ansible.builtin.fail:
    msg: >-
      The source URL {{ glance_image_url }} did not return an ETag
      header. The glance_image role requires an ETag to detect upstream
      image changes. Use a source that exposes an ETag header.
  when: _glance_image_source_head.etag is not defined

- name: Capture source ETag
  run_once: true
  ansible.builtin.set_fact:
    _glance_image_source_etag: "{{ _glance_image_source_head.etag }}"

- name: Check if image exists
  run_once: true
  openstack.cloud.image_info:
    cloud: atmosphere
    image: "{{ glance_image_name }}"
  register: _image_info
  # NOTE(mnaser): This often fails since the SSL certificates are not
  #               ready yet. We need to wait for them to be ready.
  retries: 120
  delay: 1
  until: _image_info is not failed

- name: Capture existing image and its Atmosphere metadata
  run_once: true
  ansible.builtin.set_fact:
    _glance_image_existing: "{{ _image_info.images[0] | default({}) }}"
    _glance_image_existing_props: "{{ (_image_info.images[0] | default({})).properties | default({}) }}"

- name: Decide whether image upload is required
  run_once: true
  ansible.builtin.set_fact:
    _glance_image_needs_upload: "{{
      (_image_info.images | length == 0)
      or ((_glance_image_existing_props['atmosphere:image:url'] | default('')) != glance_image_url)
      or ((_glance_image_existing_props['atmosphere:image:etag'] | default('')) != _glance_image_source_etag) }}"

- name: Download image and upload into Glance
  run_once: true
  when: _glance_image_needs_upload
  block:
    - name: Generate temporary work directory
      ansible.builtin.tempfile:
        path: "{{ glance_image_tempfile_path | default(omit) }}"
        state: directory
      register: _workdir

    - name: Download image
      ansible.builtin.get_url:
        url: "{{ glance_image_url }}"
        dest: "{{ _workdir.path }}/{{ glance_image_url | basename }}"
        mode: "0600"
        tmp_dest: "{{ _workdir.path }}"
      register: _get_url
      retries: 3
      delay: "{{ 15 | random + 3 }}"
      until: _get_url is not failed
      environment:
        http_proxy: "{{ glance_image_http_proxy }}"
        https_proxy: "{{ glance_image_https_proxy }}"
        no_proxy: "{{ glance_image_no_proxy }}"

    - name: Get image format
      changed_when: false
      ansible.builtin.shell: |
        set -o pipefail
        qemu-img info {{ _get_url.dest }} | grep -i "file format" | awk '{ print $3 }'
      args:
        executable: /bin/bash
      register: _image_format

    - name: Convert file to target disk format
      when:
        - glance_image_disk_format not in ['aki', 'ari']
        - glance_image_disk_format != _image_format.stdout
      changed_when: true
      ansible.builtin.command:
        qemu-img convert -O {{ glance_image_disk_format }} {{ _get_url.dest }} {{ _get_url.dest }}.converted
      register: glance_image_conversion

    - name: Wait until image service ready
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: glance-api
        namespace: openstack
        wait_sleep: 1
        wait_timeout: 600
        wait: true
        wait_condition:
          type: Available
          status: true

    - name: Rename outdated image to preserve audit trail
      when: _image_info.images | length > 0
      vars:
        _existing_etag_raw: "{{ _glance_image_existing_props['atmosphere:image:etag'] | default('') }}"
        _existing_etag_short: "{{ (_existing_etag_raw | regex_replace('[^A-Za-z0-9]', ''))[:12] }}"
        _existing_id_short: "{{ (_glance_image_existing.id | default('') | regex_replace('-', ''))[:12] }}"
        _existing_suffix: "{{ _existing_etag_short if _existing_etag_short | length > 0 else _existing_id_short }}"
      openstack.cloud.image:
        cloud: atmosphere
        id: "{{ _glance_image_existing.id }}"
        name: "{{ glance_image_name }}-{{ _existing_suffix }}"
        visibility: "{{ _glance_image_existing.visibility | default(omit) }}"
        tags:
          - atmosphere:obsolete
      retries: "{{ glance_image_retries | default(60) }}"
      delay: 5
      register: _rename_result
      until: _rename_result is not failed

    - name: Upload image into Glance
      openstack.cloud.image:
        cloud: atmosphere
        name: "{{ glance_image_name }}"
        filename: "{{ _get_url.dest }}{% if glance_image_conversion is not skipped %}.converted{% endif %}"
        min_disk: "{{ glance_image_min_disk | default(omit) }}"
        min_ram: "{{ glance_image_min_ram | default(omit) }}"
        container_format: "{{ glance_image_container_format | default(omit) }}"
        disk_format: "{{ glance_image_disk_format | default(omit) }}"
        properties: "{{ (glance_image_properties | default({})) | combine({'atmosphere:image:url': glance_image_url, 'atmosphere:image:etag': _glance_image_source_etag}) }}"
        kernel: "{{ glance_image_kernel | default(omit) }}"
        ramdisk: "{{ glance_image_ramdisk | default(omit) }}"
        is_public: "{{ glance_image_is_public | default(omit) }}"
        tags: "{{ glance_image_tags | default(omit) }}"
        wait: true
        timeout: 600
      # NOTE(mnaser): This often fails since the SSL certificates are not
      #               ready yet. We need to wait for them to be ready.
      retries: "{{ glance_image_retries | default(60) }}"
      delay: 5
      register: _result
      until: _result is not failed
  always:
    - name: Remove work directory
      ansible.builtin.file:
        path: "{{ _workdir.path }}"
        state: absent
      when: _workdir.path is defined
