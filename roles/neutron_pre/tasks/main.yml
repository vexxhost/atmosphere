# Thin shim that runs the neutron tasks safe to execute in parallel
# with the rest of the neutron role. The actual task list lives in the
# neutron role at `tasks/_pre.yml` to avoid duplication.
- name: Run parallelizable neutron tasks
  ansible.builtin.include_role:
    name: vexxhost.atmosphere.neutron
    tasks_from: _pre.yml
