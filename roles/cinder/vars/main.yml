_cinder_endpoint_values:
  identity:
    auth:
      admin:
        region_name: "{{ openstack_helm_endpoints_keystone_region_name }}"
        username: "admin-{{ openstack_helm_endpoints_keystone_region_name }}"
        password: "{{ openstack_helm_endpoints_keystone_admin_password }}"
        project_name: admin
        user_domain_name: default
        project_domain_name: default
      cinder:
        role: admin,service
        region_name: "{{ openstack_helm_endpoints_cinder_region_name }}"
        username: "cinder-{{ openstack_helm_endpoints_cinder_region_name }}"
        password: "{{ openstack_helm_endpoints_cinder_keystone_password }}"
        project_name: service
        user_domain_name: service
        project_domain_name: service
      nova:
        role: admin,service
        region_name: "{{ openstack_helm_endpoints_cinder_region_name }}"
        username: cinder_nova
        password: "{{ openstack_helm_endpoints_cinder_keystone_password }}"
        project_name: service
        user_domain_name: service
        project_domain_name: service
      swift:
        role: admin,service
        region_name: "{{ openstack_helm_endpoints_cinder_region_name }}"
        username: cinder_swift
        password: "{{ openstack_helm_endpoints_cinder_keystone_password }}"
        project_name: service
        user_domain_name: service
        project_domain_name: service
      service:
        role: admin,service
        region_name: "{{ openstack_helm_endpoints_cinder_region_name }}"
        username: cinder_service_user
        password: "{{ openstack_helm_endpoints_cinder_keystone_password }}"
        project_name: service
        user_domain_name: service
        project_domain_name: service
      test:
        role: admin
        region_name: "{{ openstack_helm_endpoints_cinder_region_name }}"
        username: cinder-test
        password: "{{ openstack_helm_endpoints_tempest_keystone_password | default(openstack_helm_endpoints_cinder_keystone_password) }}"
        project_name: test
        user_domain_name: service
        project_domain_name: service

# Replace the generic identity auth map so cinder does not inherit unrelated
# service users such as glance from openstack_helm_endpoints.
_cinder_identity_endpoint_values: "{{ openstack_helm_endpoints['identity'] | combine(_cinder_endpoint_values['identity']) }}"

__cinder_helm_values:
  endpoints: "{{ openstack_helm_endpoints | combine({'identity': _cinder_identity_endpoint_values}) }}"
  images:
    tags: "{{ atmosphere_images | vexxhost.atmosphere.openstack_helm_image_tags('cinder') }}"
  pod:
    labels:
      include_app_kubernetes_io: false
    replicas:
      api: 3
      scheduler: 3
    mounts:
      cinder_volume:
        cinder_volume:
          volumeMounts:
            - name: cinder-tmp
              mountPath: /var/lib/cinder/tmp
          volumes:
            - name: cinder-tmp
              emptyDir: {}
    security_context:
      cinder_volume:
        container:
          cinder_volume:
            privileged: true

  conf:
    policy: {}
    cinder:
      DEFAULT:
        allowed_direct_url_schemes: cinder
        backup_driver: cinder.backup.drivers.ceph.CephBackupDriver
        log_config_append: null
        os_region_name: "{{ openstack_helm_endpoints['identity']['auth']['cinder']['region_name'] }}"
        volume_usage_audit_period: hour
        volume_name_template: volume-%s
        image_conversion_disable: true
        osapi_volume_workers: 8
      barbican:
        barbican_endpoint_type: internal
      cors:
        allowed_origins: "*"
      database:
        connection_recycle_time: 600
        max_overflow: 50
        max_pool_size: 5
        pool_timeout: 30
      oslo_messaging_notifications:
        driver: noop
      privsep_osbrick:
        helper_command: sudo cinder-rootwrap /etc/cinder/rootwrap.conf privsep-helper --config-file /etc/cinder/cinder.conf
  manifests:
    ingress_api: false
    job_clean: false
    service_ingress_api: false

__cinder_staffeln_helm_values:
  conf:
    policy:
      backup:delete: "rule:admin_api or (project_id:%(project_id)s and http://staffeln-api:8808/v1/backup?backup_id=%(id)s)"

_cinder_ingress_annotations:
  nginx.ingress.kubernetes.io/proxy-body-size: "0"
  nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
