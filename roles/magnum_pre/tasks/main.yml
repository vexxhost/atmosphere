# Thin shim that runs the magnum tasks safe to execute in parallel with
# the rest of the magnum role. The actual task list lives in the magnum
# role at `tasks/_pre.yml` to avoid duplication.
- name: Run parallelizable magnum tasks
  ansible.builtin.include_role:
    name: vexxhost.atmosphere.magnum
    tasks_from: _pre.yml
