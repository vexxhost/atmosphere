- hosts: all
  tasks:
    - name: Copy inventory file for Zuul
      run_once: true
      ansible.builtin.copy:
        src: "{{ zuul.executor.inventory_file }}"
        dest: "{{ zuul.project.src_dir }}"
        mode: "0644"

    - name: Switch "ansible_host" to private IP
      run_once: true
      ansible.builtin.replace:
        path: "{{ zuul.project.src_dir }}/inventory.yaml"
        regexp: '(^\s*ansible_host:\s*).*$'
        replace: '\1"{% raw %}{{ nodepool.private_ipv4 }}{% endraw %}"'

    - name: Run molecule prepare
      run_once: true
      ansible.builtin.command:
        cmd: uv run molecule prepare -s {{ molecule_scenario }}
      environment: "{{ molecule_environment | default({}) }}"
      args:
        chdir: "{{ zuul.project.src_dir }}"

- name: Run converge
  ansible.builtin.import_playbook: "molecule/{{ molecule_scenario }}/converge.yml"

# TODO: Capture atmosphere deploy exit code to detect changes for
#       idempotence testing without a full second run.

- hosts: all
  tasks:
    - name: Run molecule verify
      run_once: true
      ansible.builtin.command:
        cmd: uv run molecule verify -s {{ molecule_scenario }}
      environment: "{{ molecule_environment | default({}) }}"
      args:
        chdir: "{{ zuul.project.src_dir }}"
