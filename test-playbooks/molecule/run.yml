- hosts: all
  tasks:
    - name: Copy inventory file for Zuul
      run_once: true
      ansible.builtin.copy:
        src: "{{ zuul.executor.inventory_file }}"
        dest: "{{ zuul.project.src_dir }}"
        mode: "0644"

    - name: Switch "ansible_host" to private IP
      run_once: true
      ansible.builtin.replace:
        path: "{{ zuul.project.src_dir }}/inventory.yaml"
        regexp: '(^\s*ansible_host:\s*).*$'
        replace: '\1"{% raw %}{{ nodepool.private_ipv4 }}{% endraw %}"'

    - name: Run molecule prepare
      run_once: true
      ansible.builtin.command:
        cmd: uv run molecule prepare -s {{ molecule_scenario }}
      environment: "{{ molecule_environment | default({}) }}"
      args:
        chdir: "{{ zuul.project.src_dir }}"

    - name: Deploy with parallel orchestrator
      run_once: true
      ansible.builtin.command:
        cmd: >-
          {{ zuul.project.src_dir }}/bin/atmosphere deploy
          --inventory {{ zuul.project.src_dir }}/inventory.yaml
          {% if atmosphere_deploy_tags is defined %}--tags {{ atmosphere_deploy_tags }}{% endif %}
      args:
        chdir: "{{ zuul.project.src_dir }}"

# TODO: Capture atmosphere deploy exit code to detect changes for
#       idempotence testing without a full second run.

- hosts: all
  become: true
  tasks:
    - name: Add IP address to "br-ex"
      when: molecule_scenario in ['aio']
      changed_when: false
      ansible.builtin.shell:
        cmd: ip addr add 10.96.250.10/24 dev br-ex || true

    - name: Set "br-ex" interface to "up"
      when: molecule_scenario in ['aio']
      changed_when: false
      ansible.builtin.shell:
        cmd: ip link set br-ex up || true

- hosts: all
  tasks:
    - name: Run molecule verify
      run_once: true
      ansible.builtin.command:
        cmd: uv run molecule verify -s {{ molecule_scenario }}
      environment: "{{ molecule_environment | default({}) }}"
      args:
        chdir: "{{ zuul.project.src_dir }}"
