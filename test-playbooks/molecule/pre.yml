- hosts: all
  become: true
  tasks:
    - name: Install "jq" for log collection
      ansible.builtin.apt:
        name: jq
        update_cache: true
      when:
        - ansible_facts['os_family'] | lower == 'debian'

- hosts: all
  roles:
    - role: ensure-go
      go_version: "1.24.4"
