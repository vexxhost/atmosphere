---
other:
  - |
    The ``keystone_pre``, ``neutron_pre``, ``octavia_pre`` and
    ``magnum_pre`` roles used by the parallel deploy orchestrator no
    longer duplicate task definitions from their main roles. Each pair
    now shares a single ``tasks/_pre.yml`` file inside the main role,
    which both the main role and the pre-role include. Behavior does
    not change in either sequential ``playbooks/site.yml`` or parallel
    ``atmosphere deploy`` modes.
