---
features:
  - |
    Operators can now configure additional properties on each Neutron
    network and subnet declared through the ``neutron_networks`` variable. New
    supported network properties include the administrative state, DNS
    domain, default external network flag, VLAN transparency, and owning
    project. New supported subnet properties include explicit allocation
    pools, a description, extra attributes, prefix length, owning project,
    subnet pool, and the option to allocate from the default subnet pool.
  - |
    Operators can now set a gateway address and DNS name servers on the
    Ironic bare metal subnet through the
    ``ironic_bare_metal_subnet_gateway_ip`` and
    ``ironic_bare_metal_subnet_dns_nameservers`` variables.
