---
fixes:
  - |
    Fixed the ``ceph_provisioners``, ``ceph_csi_rbd``, and
    ``rook_ceph_cluster`` roles to call the new ``vexxhost.ceph.key_info``
    module when reading existing CephX keys. Recent versions of the
    ``vexxhost.ceph`` collection removed ``state: info`` from the
    ``vexxhost.ceph.key`` module.
  - |
    Fixed the ``storage_to_ceph_provisioners_helm_values`` filter plugin so
    it unwraps Ansible lazy value wrappers before validating the
    ``atmosphere_storage`` input. Ansible-core 2.20, which Ubuntu 26.04
    requires, wraps rendered values in lazy containers that previously
    broke the Pydantic discriminated-union check.
  - |
    Pinned ``containerd_limit_open_file_num`` to ``1048576`` when importing
    the Kubernetes and Ceph playbooks. Ubuntu 26.04 resolves
    ``LimitNOFILE=infinity`` to ``2147483584``, which every container
    inherits. Workloads that iterate through inherited file descriptors
    before ``execve``, such as HAProxy external-check scripts spawned by
    the Percona XtraDB cluster, then spend tens of seconds in the close
    loop and time out.
  - |
    Raised the default Keycloak ``resourcesPreset`` from ``small`` to
    ``large``. Keycloak 24 runs its Quarkus augmentation step on first
    boot and needs more than the 1536 MiB allowed by the ``medium``
    preset to complete before its HTTP port becomes reachable; smaller
    presets trigger an ``OOMKilled``. Operators can still override the
    preset through ``keycloak_helm_values``.
  - |
    Defined the default ``magnum_images`` list directly in the Magnum
    and ``magnum_pre`` role defaults, removing the ``_magnum_images``
    variable indirection. Ansible-core 2.20 wraps the rendered template
    in a lazy container that the ``loop`` keyword rejects with ``must
    resolve to a 'list', not 'str'``.

