---
features:
  - |
    Added native incident.io alerting documentation and updated Alertmanager,
    Prometheus Operator, and Prometheus config reloader images to versions that
    support ``incidentio_configs``.
upgrade:
  - |
    Upgraded ``kube-prometheus-stack`` to 81.2.2, which aligns the bundled
    custom resource definitions with ``prometheus-operator`` 0.88.0. The
    Alertmanager CRD now declares ``status.selector`` for status patches and
    the scale subresource used by the newer operator.
