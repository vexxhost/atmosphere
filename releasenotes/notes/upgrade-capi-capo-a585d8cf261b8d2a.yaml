---
upgrade:
  - |
    The default ``Cluster API`` images now use version 1.13.2. The default
    ``Cluster API Provider OpenStack`` image now uses version 0.14.4. The
    minimum VEXXHOST Kubernetes collection version is now 3.2.0 so the matching
    provider manifests and ``clusterctl`` checksums are available.
    Operators should verify the management cluster Kubernetes version is
    compatible with Cluster API 1.13 before upgrading Magnum.
