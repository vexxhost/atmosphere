---
other:
  - |
    The ``atmosphere-molecule`` CI parent job now declares an
    ``irrelevant-files`` list covering documentation, release
    notes, repository meta files, and similar non-deployment
    paths. All child molecule jobs inherit it, so pull requests
    that only touch ``doc/``, ``releasenotes/``, ``README.md``,
    ``CLAUDE.md``, or files under ``.github/instructions``,
    ``.github/styles``, ``.github/skills``, and
    ``.github/ISSUE_TEMPLATE`` no longer trigger a full deployment
    build on every push.
