---
features:
  - |
    Added support for HPE Nimble Storage as a CSI driver and Cinder volume
    backend. Operators can configure the HPE Nimble CSI driver for
    Kubernetes persistent volumes and use the Nimble volume backend in
    the unified ``atmosphere_storage`` configuration for Cinder. Both the
    CSI driver and the Cinder backend support iSCSI and Fibre Channel. The
    CSI driver defaults to iSCSI. Set ``hpe_nimble_csi_access_protocol`` to
    ``fc`` to use Fibre Channel.
