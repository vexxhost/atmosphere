---
features:
  - |
    Adds three Prometheus alerts that catch network underlay drift on
    compute hosts:

    * ``GeneveTransmitErrors`` fires when a Geneve overlay device
      (``genev_sys_*``) reports more than ~100 transmit errors per minute
      sustained for 10 minutes. This is the canonical signal for an MTU
      (maximum transmission unit) mismatch between the Geneve VTEP
      (virtual tunnel endpoint) and the underlay bond.
    * ``GeneveTransmitDrops`` fires on >10 transmit drops/s sustained for
      10 minutes on the Geneve overlay device.
    * ``NodeBondMTUInconsistent`` fires when a node's bond MTU differs
      from the median across the fleet, catching both initial
      misconfiguration and post-reboot drift.

    These alerts target a class of incident where a single compute host's
    bond MTU drifts below the fleet value, causing the underlay to drop
    jumbo Geneve frames. The downstream symptoms include TLS handshake
    stalls and noisy live-migration events.
