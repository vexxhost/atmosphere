---
features:
  - |
    Three Prometheus alerts have been added for catching network underlay
    drift on compute hosts:

    * ``GeneveTransmitErrors`` fires when a Geneve overlay device
      (``genev_sys_*``) reports more than ~100 transmit errors per minute
      sustained for 10 minutes. This is the canonical signal for an MTU
      mismatch between the Geneve VTEP and the underlay bond.
    * ``GeneveTransmitDrops`` fires on >10 transmit drops/s sustained for
      10 minutes on the Geneve overlay device.
    * ``NodeBondMTUInconsistent`` fires when a node's ``bond0`` MTU
      differs from the median across the fleet, catching both initial
      misconfiguration and post-reboot drift.

    These alerts target a class of incident where a single compute host's
    bond0 MTU drifts below the fleet value, causing jumbo Geneve frames to
    be silently dropped on the underlay and surfacing downstream as TLS
    handshake stalls and noisy live-migration events.
