- hosts: "{{ target | default('all') }}"
  become: true
  roles:
    - role: defaults
    - role: sysctl
      tags:
        - sysctl
    - role: ethtool
      tags:
        - ethtool
     # NOTE(fitbeard) networkd-dispatcher is not available for EL distros
      when: ansible_facts['os_family'] in ['Debian']
  post_tasks:
    - name: Set a fact with the "atmosphere_images" for other plays
      ansible.builtin.set_fact:
        atmosphere_images: "{{ atmosphere_images }}"
        atmosphere_kubernetes_version: "{{ atmosphere_kubernetes_version }}"
      tags:
        - always

- import_playbook: vexxhost.kubernetes.site
  vars:
    keepalived_image: "{{ atmosphere_images['keepalived'] }}"
    keepalived_vrid: "{{ kubernetes_keepalived_vrid }}"
    keepalived_interface: "{{ kubernetes_keepalived_interface }}"
    keepalived_vip: "{{ kubernetes_keepalived_vip }}"
    haproxy_image: "{{ atmosphere_images['haproxy'] }}"
    containerd_pause_image: "{{ atmosphere_images['pause'] }}"
    kubernetes_image_repository: "{{ atmosphere_images['kube_apiserver'] | vexxhost.kubernetes.docker_image('prefix') }}"
    kubernetes_version: "{{ atmosphere_kubernetes_version }}"
    cilium_node_image: "{{ atmosphere_images['cilium_node'] }}"
    cilium_operator_image: "{{ atmosphere_images['cilium_operator'] }}"
    kube_vip_image: "{{ atmosphere_images['kube_vip'] }}"

- hosts: "{{ target | default('all') }}"
  become: true
  roles:
    - role: vexxhost.atmosphere.kubernetes_node_labels
      tags:
        - kubernetes-node-labels

# NOTE(rlin): AIO-BM with Magnum/CAPI + Ironic emulator pushes well past
#             the kubelet default of maxPods=110 (sushy + ironic + magnum
#             control plane + nova-compute-ironic + emulated BM workloads).
#             Bump to 250 so the single AIO node can schedule everything.
- hosts: "{{ target | default('all') }}"
  become: true
  gather_facts: false
  tags:
    - kubelet-max-pods
  tasks:
    - name: Set kubelet maxPods=250 in /var/lib/kubelet/config.yaml
      ansible.builtin.lineinfile:
        path: /var/lib/kubelet/config.yaml
        regexp: '^maxPods:'
        line: 'maxPods: 250'
        create: false
        state: present
      register: _kubelet_max_pods
      when: atmosphere_baremetal_emulator_enabled | default(false) | bool

    - name: Ensure maxPods=250 is appended if missing
      ansible.builtin.shell: |
        grep -q '^maxPods:' /var/lib/kubelet/config.yaml || echo 'maxPods: 250' >> /var/lib/kubelet/config.yaml
      args:
        executable: /bin/bash
      changed_when: false
      when: atmosphere_baremetal_emulator_enabled | default(false) | bool

    - name: Restart kubelet if maxPods changed
      ansible.builtin.systemd:
        name: kubelet
        state: restarted
      when:
        - atmosphere_baremetal_emulator_enabled | default(false) | bool
        - _kubelet_max_pods is changed

# NOTE(mnaser): Add task to uninstall "unattended-upgrades" to avoid system
#               upgrades during the deployment
- hosts: "{{ target | default('all') }}"
  become: true
  gather_facts: false
  tasks:
    - name: Uninstall unattended-upgrades
      ansible.builtin.package:
        name: unattended-upgrades
        state: absent
      register: _uninstall_unattended
      retries: 5
      delay: 10
      until: _uninstall_unattended is not failed
