# Full Ironic emulator deployment from PR 3385, wired into the parallel
# orchestrator as a single PlaybookType component (see
# internal/deploy/component.go: "ironic-emulator").
#
# Play ordering matches PR 3385:
#   1. OVS bridges on every host
#   2. Ironic helm chart + sushy emulator on controllers[0]
#   3. Ironic API NodePort service so emulated BM nodes can reach it
#      through the clean network (172.24.6.254:32574)
#   4. Register emulated baremetal nodes via openstack CLI

- name: Configure Ironic network
  hosts: all
  become: true
  tasks:
    - name: Get OVS pods info
      kubernetes.core.k8s_info:
        namespace: openstack
        kind: Pod
        label_selectors:
          - application=openvswitch
          - component=server
      register: ovs_pod
      when: atmosphere_baremetal_emulator_enabled | default(false) | bool

    - name: Create "ironic-pxe" bridge
      changed_when: false
      kubernetes.core.k8s_exec:
        namespace: openstack
        pod: "{{ ovs_pod.resources[0].metadata.name }}"
        command: ovs-vsctl --may-exist add-br ironic-pxe
      when: >-
        (atmosphere_baremetal_emulator_enabled | default(false) | bool)
        and (atmosphere_baremetal_pxe_use_internal_bridge | default(true) | bool)

    - name: Create connection between "ironic-pxe" and "br-ex"
      changed_when: false
      kubernetes.core.k8s_exec:
        namespace: openstack
        pod: "{{ ovs_pod.resources[0].metadata.name }}"
        command: >-
          ovs-vsctl
          --may-exist add-port br-ex patch-ex-ironic-pxe
          -- set interface patch-ex-ironic-pxe type=patch options:peer=patch-ironic-pxe-ex
          -- set port patch-ex-ironic-pxe tag=4090
          -- --may-exist add-port ironic-pxe patch-ironic-pxe-ex
          -- set interface patch-ironic-pxe-ex type=patch options:peer=patch-ex-ironic-pxe
      when: >-
        (atmosphere_baremetal_emulator_enabled | default(false) | bool)
        and (atmosphere_baremetal_pxe_use_internal_bridge | default(true) | bool)

    - name: Create node ports on ironic-pxe
      changed_when: false
      kubernetes.core.k8s_exec:
        namespace: openstack
        pod: "{{ ovs_pod.resources[0].metadata.name }}"
        command: >-
          ovs-vsctl
          --may-exist add-port ironic-pxe ovs-node-0i1
          -- --may-exist add-port ironic-pxe ovs-node-0i2
          -- --may-exist add-port ironic-pxe ovs-node-1i1
          -- --may-exist add-port ironic-pxe ovs-node-1i2
          -- --may-exist add-port ironic-pxe ovs-node-2i1
          -- --may-exist add-port ironic-pxe ovs-node-2i2
      when: >-
        (atmosphere_baremetal_emulator_enabled | default(false) | bool)
        and (atmosphere_baremetal_pxe_use_internal_bridge | default(true) | bool)

    - name: Wire BM emulator taps directly into br-ex (VLAN 4090)
      changed_when: false
      kubernetes.core.k8s_exec:
        namespace: openstack
        pod: "{{ ovs_pod.resources[0].metadata.name }}"
        command: >-
          ovs-vsctl
          --may-exist add-port br-ex ovs-node-0i1 tag=4090
          -- --may-exist add-port br-ex ovs-node-0i2 tag=4090
          -- --may-exist add-port br-ex ovs-node-1i1 tag=4090
          -- --may-exist add-port br-ex ovs-node-1i2 tag=4090
          -- --may-exist add-port br-ex ovs-node-2i1 tag=4090
          -- --may-exist add-port br-ex ovs-node-2i2 tag=4090
      when: >-
        (atmosphere_baremetal_emulator_enabled | default(false) | bool)
        and not (atmosphere_baremetal_pxe_use_internal_bridge | default(true) | bool)

    - name: Bump OVS port MTU on BM emulator i1 taps for IB-shape
      changed_when: false
      kubernetes.core.k8s_exec:
        namespace: openstack
        pod: "{{ ovs_pod.resources[0].metadata.name }}"
        command: >-
          ovs-vsctl
          set Interface ovs-node-0i1 mtu_request={{ bm_emulator_ib_mtu | default(2044) }}
          -- set Interface ovs-node-1i1 mtu_request={{ bm_emulator_ib_mtu | default(2044) }}
          -- set Interface ovs-node-2i1 mtu_request={{ bm_emulator_ib_mtu | default(2044) }}
      when: >-
        (atmosphere_baremetal_emulator_enabled | default(false) | bool)
        and (bm_emulator_ib_shape_enabled | default(false) | bool)

    - name: Add IP address to "ironic-pxe"
      changed_when: false
      ansible.builtin.shell:
        cmd: ip addr add 172.24.6.254/24 dev ironic-pxe || true
      when: >-
        (atmosphere_baremetal_emulator_enabled | default(false) | bool)
        and (atmosphere_baremetal_pxe_use_internal_bridge | default(true) | bool)

    - name: Set "ironic-pxe" interface to "up"
      changed_when: false
      ansible.builtin.shell:
        cmd: ip link set ironic-pxe up || true
      when: >-
        (atmosphere_baremetal_emulator_enabled | default(false) | bool)
        and (atmosphere_baremetal_pxe_use_internal_bridge | default(true) | bool)

- name: Deploy Ironic helm chart and sushy emulator
  hosts: controllers[0]
  become: true
  roles:
    - role: ironic
      when: atmosphere_baremetal_emulator_enabled | default(false) | bool
      tags:
        - ironic
        - ironic-emulator

    - role: sushy
      when: atmosphere_baremetal_emulator_enabled | default(false) | bool
      tags:
        - sushy
        - ironic-emulator

- name: Expose Ironic API for clean network
  hosts: all
  become: true
  tasks:
    - name: Expose Ironic API with node port
      when: atmosphere_baremetal_emulator_enabled | default(false) | bool
      kubernetes.core.k8s:
        state: present
        definition:
          - apiVersion: v1
            kind: Service
            metadata:
              name: ironic-api-nodeport
              namespace: openstack
            spec:
              type: NodePort
              selector:
                application: ironic
                component: api
              ports:
                - name: http
                  port: 6385
                  targetPort: 6385
                  nodePort: 32574
                  protocol: TCP

- name: Create Ironic virtual nodes
  hosts: controllers[0]
  become: true
  roles:
    - role: ironic_emulator_nodes
      when: atmosphere_baremetal_emulator_enabled | default(false) | bool
      tags:
        - ironic-emulator-nodes
        - ironic-emulator
