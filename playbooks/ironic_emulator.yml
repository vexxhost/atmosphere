# Deploy Ironic itself via the parallel orchestrator pass-through so it picks
# up the workspace-generated group_vars (endpoints.yml, secrets.yml, ...).
- name: Deploy Ironic helm chart via atmosphere orchestrator
  hosts: controllers[0]
  become: true
  tasks:
    - name: Run ironic helm deploy through atmosphere binary
      ansible.builtin.shell:
        cmd: ./bin/atmosphere deploy --inventory ./inventory.yaml --tags ironic
        chdir: "{{ playbook_dir }}/.."
        executable: /bin/bash
      changed_when: false
      when:
        - atmosphere_baremetal_emulator_enabled | default(false) | bool
      tags:
        - ironic
        - ironic-emulator

- name: Deploy Ironic emulator (libvirt-backed BM nodes + sushy)
  hosts: controllers[0]
  become: true
  tasks:
    - name: Run sushy (Redfish emulator) role
      ansible.builtin.import_role:
        name: sushy
      when:
        - atmosphere_baremetal_emulator_enabled | default(false) | bool
      tags:
        - sushy
        - ironic-emulator

    - name: Run ironic_emulator_nodes role
      ansible.builtin.import_role:
        name: ironic_emulator_nodes
      when:
        - atmosphere_baremetal_emulator_enabled | default(false) | bool
      tags:
        - ironic-emulator
