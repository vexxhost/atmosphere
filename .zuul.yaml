- nodeset:
    name: atmosphere-ubuntu-jammy-single-node
    nodes:
      - name: instance
        label: ubuntu-jammy
    groups: &single_node_groups
      - name: controllers
        nodes:
          - instance
      - name: cephs
        nodes:
          - instance
      - name: computes
        nodes:
          - instance

- nodeset:
    name: atmosphere-ubuntu-jammy-single-node-16
    nodes:
      - name: instance
        label: ubuntu-jammy-16
    groups: *single_node_groups

- job:
    name: atmosphere-go-test
    parent: base
    nodeset: atmosphere-ubuntu-jammy-single-node
    description: |
      Runs Go unit tests for the atmosphere deploy orchestrator
      (pkg/dag, internal/deploy, cmd/atmosphere).
    run:
      - test-playbooks/go-test/run.yml

- job:
    name: atmosphere-molecule
    parent: molecule
    abstract: true
    nodeset: atmosphere-ubuntu-jammy-single-node
    pre-run: test-playbooks/molecule/pre.yml
    post-run: test-playbooks/molecule/post.yml
    roles:
      - zuul: opendev.org/openstack/openstack-helm
    vars:
      molecule_environment:
        ATMOSPHERE_MOLECULE_INVENTORY: "{{ ansible_user_dir }}/{{ zuul.project.src_dir }}/inventory.yaml"
      atmosphere_image_prefix: "harbor.atmosphere.dev/"
      ceph_fsid: 4837cbf8-4f90-4300-b3f6-726c9b9f89b4
      ceph_public_network: "{{ ansible_facts['default_ipv4']['network'] + '/' + (ansible_facts['default_ipv4']['prefix'] | string) }}"
      ceph_conf_overrides:
        - section: global
          option: mon allow pool size one
          value: true
        - section: global
          option: osd crush chooseleaf type
          value: 0
        - section: mon
          option: auth allow insecure global id reclaim
          value: false
      ceph_osd_devices:
        - "/dev/ceph-{{ inventory_hostname_short }}-osd0/data"
        - "/dev/ceph-{{ inventory_hostname_short }}-osd1/data"
        - "/dev/ceph-{{ inventory_hostname_short }}-osd2/data"
      kube_vip_interface: "{{ ansible_facts['default_ipv4'].interface }}"
      kube_vip_address: 172.17.0.100
      kubernetes_hostname: "{{ ansible_facts['default_ipv4'].address }}"
      cilium_helm_values:
        operator:
          replicas: 1
      ceph_csi_rbd_helm_values:
        provisioner:
          replicaCount: 1

- job:
    name: atmosphere-molecule-csi
    parent: atmosphere-molecule
    abstract: true
    vars:
      molecule_scenario: csi

- job:
    name: atmosphere-molecule-csi-local-path-provisioner
    parent: atmosphere-molecule-csi
    run:
      - molecule/csi/converge.yml
      - test-playbooks/molecule/run.yml
    vars:
      csi_driver: local-path-provisioner
      atmosphere_deploy_tags: kubernetes,csi

- job:
    name: atmosphere-molecule-csi-rbd
    parent: atmosphere-molecule-csi
    run:
      - molecule/csi/converge.yml
      - test-playbooks/molecule/run.yml
    vars:
      csi_driver: rbd
      atmosphere_deploy_tags: ceph,kubernetes,csi

- job:
    name: atmosphere-molecule-aio
    parent: atmosphere-molecule
    abstract: true
    timeout: 7200
    nodeset: atmosphere-ubuntu-jammy-single-node-16
    vars:
      molecule_scenario: aio

- job:
    name: atmosphere-molecule-aio-openvswitch
    parent: atmosphere-molecule-aio
    run:
      - molecule/aio/converge.yml
      - test-playbooks/molecule/run.yml
    vars:
      atmosphere_network_backend: openvswitch
      molecule_environment:
        ATMOSPHERE_NETWORK_BACKEND: openvswitch

- job:
    name: atmosphere-molecule-aio-ovn
    parent: atmosphere-molecule-aio
    run:
      - molecule/aio/converge.yml
      - test-playbooks/molecule/run.yml
    vars:
      atmosphere_network_backend: ovn
      molecule_environment:
        ATMOSPHERE_NETWORK_BACKEND: ovn

- job:
    name: atmosphere-molecule-keycloak
    parent: atmosphere-molecule
    run:
      - molecule/keycloak/converge.yml
      - test-playbooks/molecule/run.yml
    vars:
      molecule_scenario: keycloak
      csi_driver: local-path-provisioner
      cluster_issuer_type: self-signed
      atmosphere_deploy_tags: kubernetes,csi,cert-manager,cluster-issuer,ingress-nginx,rabbitmq-cluster-operator,percona-xtradb-cluster-operator,percona-xtradb-cluster,valkey,memcached,keycloak,kube-prometheus-stack,keystone,horizon
      percona_xtradb_cluster_spec:
        allowUnsafeConfigurations: true
        pxc:
          size: 1
        haproxy:
          size: 1
      keystone_helm_values:
        pod:
          replicas:
            api: 1
      ingress_nginx_helm_values:
        controller:
          config:
            worker-processes: 2

- project:
    check:
      jobs:
        - atmosphere-go-test
        - atmosphere-molecule-aio-openvswitch
        - atmosphere-molecule-aio-ovn
        - atmosphere-molecule-csi-local-path-provisioner
        - atmosphere-molecule-csi-rbd
        - atmosphere-molecule-keycloak
    gate:
      jobs:
        - atmosphere-go-test
        - atmosphere-molecule-aio-openvswitch
        - atmosphere-molecule-aio-ovn
        - atmosphere-molecule-csi-local-path-provisioner
        - atmosphere-molecule-csi-rbd
        - atmosphere-molecule-keycloak
